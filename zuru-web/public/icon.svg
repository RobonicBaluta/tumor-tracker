<!-- Tumor Tracker app icon. 512x512 maskable: el dibujo principal vive
     dentro del círculo "safe area" del 80% para que los OS Android lo
     puedan recortar a círculo / squircle sin perder el símbolo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1b2e4a" />
      <stop offset="60%" stop-color="#0d1b2a" />
      <stop offset="100%" stop-color="#050a14" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd479" />
      <stop offset="55%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a6b1c" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feFlood flood-color="#d4af37" flood-opacity="0.6" result="c" />
      <feComposite in="c" in2="blur" operator="in" result="cb" />
      <feMerge>
        <feMergeNode in="cb" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background: full bleed para maskable, sin radio. -->
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Sutil viñeta de borde para dar volumen. -->
  <rect x="0" y="0" width="512" height="512" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="32" />

  <!-- Símbolo biohazard estilizado dentro del safe-area (80% = 102..410 px). -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <!-- Inner ring (centro del hazard) -->
    <circle r="34" fill="url(#gold)" />
    <circle r="34" fill="none" stroke="#0d1b2a" stroke-width="8" />

    <!-- Tres trefoles (rotation 0, 120, 240).
         Cada trefol = un blob biohazard simplificado. -->
    <g>
      <path d="M -60 -80 Q -120 -110 -90 -160 Q -50 -200 0 -185 Q -10 -150 -40 -130 Q -60 -110 -60 -80 Z"
            fill="url(#gold)" stroke="#0d1b2a" stroke-width="6" stroke-linejoin="round" />
    </g>
    <g transform="rotate(120)">
      <path d="M -60 -80 Q -120 -110 -90 -160 Q -50 -200 0 -185 Q -10 -150 -40 -130 Q -60 -110 -60 -80 Z"
            fill="url(#gold)" stroke="#0d1b2a" stroke-width="6" stroke-linejoin="round" />
    </g>
    <g transform="rotate(240)">
      <path d="M -60 -80 Q -120 -110 -90 -160 Q -50 -200 0 -185 Q -10 -150 -40 -130 Q -60 -110 -60 -80 Z"
            fill="url(#gold)" stroke="#0d1b2a" stroke-width="6" stroke-linejoin="round" />
    </g>

    <!-- Highlight especular para dar profundidad al centro. -->
    <ellipse cx="-10" cy="-12" rx="14" ry="8" fill="#fff7d6" opacity="0.5" />
  </g>

</svg>
