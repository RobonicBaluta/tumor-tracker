<!-- Favicon: misma marca que icon.svg pero simplificado para 16-32px,
     donde los detalles finos no se ven. Sin filter:glow, sin highlight,
     sin viñeta — solo el biohazard sobre fondo navy. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd479" />
      <stop offset="100%" stop-color="#c89b3c" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0d1b2a" />
  <g transform="translate(32 32)">
    <circle r="5" fill="url(#g)" />
    <g fill="url(#g)" stroke="#0d1b2a" stroke-width="1.5" stroke-linejoin="round">
      <path d="M -8 -11 Q -16 -15 -12 -22 Q -7 -27 0 -25 Q -2 -20 -6 -18 Q -8 -15 -8 -11 Z" />
      <g transform="rotate(120)">
        <path d="M -8 -11 Q -16 -15 -12 -22 Q -7 -27 0 -25 Q -2 -20 -6 -18 Q -8 -15 -8 -11 Z" />
      </g>
      <g transform="rotate(240)">
        <path d="M -8 -11 Q -16 -15 -12 -22 Q -7 -27 0 -25 Q -2 -20 -6 -18 Q -8 -15 -8 -11 Z" />
      </g>
    </g>
  </g>
</svg>
