# Render Blueprint para tumor-tracker.
# Free tier: sin disco persistente. Los .db y .json viven en /tmp y se pierden
# cada vez que el servicio se duerme tras 15 min de inactividad. El match cache
# se reconstruye solo. Para persistencia real, sube a plan Starter y reactiva
# la sección `disk:` apuntando a /var/data + DATA_DIR=/var/data.

services:
  - type: web
    name: tumor-tracker-api
    runtime: python
    plan: free
    rootDir: zuru-web-backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd src && gunicorn main:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATA_DIR
        value: /tmp/tumor-data
      - key: CORS_ORIGINS
        sync: false   # Vercel URL — la rellenas a mano cuando el frontend esté
      - key: RIOT_API_TOKEN
        sync: false   # secret manual
