# Render Blueprint para tumor-tracker.
# Crea un servicio web Python (Flask via gunicorn) con disco persistente
# para los .db SQLite y los .json de estado.

services:
  - type: web
    name: tumor-tracker-api
    runtime: python
    plan: free
    rootDir: zuru-web-backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd src && gunicorn main:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATA_DIR
        value: /var/data
      - key: CORS_ORIGINS
        sync: false   # Vercel URL — la rellenas a mano cuando el frontend esté
      - key: RIOT_API_TOKEN
        sync: false   # secret manual
    disk:
      name: tumor-data
      mountPath: /var/data
      sizeGB: 1
